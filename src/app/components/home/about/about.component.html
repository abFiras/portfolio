<section class="section about" id="about">
  <div class="container">
    <div class="section-box">

      <div class="sr">
        <h3 class="section-title">
          <span class="n-section-title">01.</span>
          {{ "AboutMe.Title" | translate }}
        </h3>
      </div>

      <div class="about-grid">

        <!-- ─── TEXT COLUMN ─── -->
        <div class="about-text">
          <p class="sr sr-d1" [innerHTML]="'AboutMe.Paragraphs.0' | translate"></p>
          <p class="sr sr-d2" [innerHTML]="'AboutMe.Paragraphs.1' | translate"></p>
          <p class="sr sr-d3" [innerHTML]="'AboutMe.Paragraphs.2' | translate"></p>

          <h4 class="skills-heading sr sr-d4"
              [innerHTML]="'AboutMe.Paragraphs.3' | translate"></h4>

          <ul class="skills-list sr sr-d5">
            <li class="skill-chip">
              <span class="chip-icon">◈</span> Spring Boot
            </li>
            <li class="skill-chip">
              <span class="chip-icon">◈</span> Angular
            </li>
            <li class="skill-chip">
              <span class="chip-icon">◈</span> Python / Flask
            </li>
            <li class="skill-chip">
              <span class="chip-icon">◈</span> Docker
            </li>
            <li class="skill-chip">
              <span class="chip-icon">◈</span> Kubernetes
            </li>
            <li class="skill-chip">
              <span class="chip-icon">◈</span> Jenkins & GitLab CI
            </li>
            <li class="skill-chip">
              <span class="chip-icon">◈</span> AWS & Terraform
            </li>
            <li class="skill-chip">
              <span class="chip-icon">◈</span> Ansible & ArgoCD
            </li>
            <li class="skill-chip">
              <span class="chip-icon">◈</span> MySQL & PostgreSQL
            </li>
            <li class="skill-chip">
              <span class="chip-icon">◈</span> Keycloak
            </li>
            <li class="skill-chip">
              <span class="chip-icon">◈</span> TypeScript
            </li>
            <li class="skill-chip">
              <span class="chip-icon">◈</span> Penetration Testing
            </li>
          </ul>
        </div>

        <!-- ─── PHOTO COLUMN ─── -->
        <!-- 
          ╔══════════════════════════════════════════════════╗
          ║  📸 YOUR PHOTO GOES HERE                         ║
          ║  File: src/assets/images/firas.jpg               ║
          ║  Replace this file with your professional photo  ║
          ║  Recommended: Square crop, min 600x600px         ║
          ╚══════════════════════════════════════════════════╝
        -->
        <div class="about-photo-wrap sr sr-right sr-d2">
          <div class="photo-frame" (click)="openImageModal()">
            <img
              class="about-img"
              src="assets/images/firas.png"
              alt="Firas Abdallah"
              onerror="this.parentElement.classList.add('no-photo')">
            <div class="photo-overlay" (click)="openImageModal()">
              <span class="photo-overlay-text">View Full</span>
            </div>
            <div class="photo-border-anim"></div>
          </div>
          <div class="photo-accent-dot dot-1"></div>
          <div class="photo-accent-dot dot-2"></div>
        </div>

      </div>
    </div>
  </div>

  <!-- ─── IMAGE MODAL ─── -->
  <div class="image-modal-overlay" *ngIf="isImageModalOpen"
       (click)="onModalBackdropClick($event)" [@fadeInOut]>
    <div class="image-modal-container">
      <button class="modal-close-btn" (click)="closeImageModal()" aria-label="Close">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <img class="modal-image" src="assets/images/firas.png" alt="Firas Abdallah">
    </div>
  </div>
</section>
