<section class="banner" id="hero">

  <!-- ─── ANIMATED BACKGROUNDS ─── -->
  <div class="banner-grid"></div>
  <canvas class="banner-particles" #particlesCanvas></canvas>
  <div class="banner-gradient-orb orb-1"></div>
  <div class="banner-gradient-orb orb-2"></div>
  <div class="banner-gradient-orb orb-3"></div>

  <!-- ─── LEFT SOCIAL SIDEBAR ─── -->
  <div class="banner-side-left">
    <a href="https://github.com/abFiras" target="_blank" class="side-link"
       (click)='analyticsService.sendAnalyticEvent("click_github","banner","github")'>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
    </a>
    <a href="https://www.linkedin.com/in/firas--abdallah" target="_blank" class="side-link"
       (click)='analyticsService.sendAnalyticEvent("click_linkedin","banner","linkedin")'>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
    </a>
    <a href="https://www.credly.com/users/firas_abdallah" target="_blank" class="side-link"
       title="Credly Badges"
       (click)='analyticsService.sendAnalyticEvent("click_credly","banner","credly")'>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="8" r="5"/><path d="M7.5 13.5L6 22l6-3 6 3-1.5-8.5"/></svg>
    </a>
    <a href="mailto:abdallah.firas@outlook.fr" class="side-link"
       (click)='analyticsService.sendAnalyticEvent("click_email","banner","email")'>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
    </a>
    <div class="side-line"></div>
  </div>

  <!-- ─── RIGHT EMAIL SIDEBAR ─── -->
  <div class="banner-side-right">
    <a href="mailto:abdallah.firas@outlook.fr" class="side-email">abdallah.firas&#64;outlook.fr</a>
    <div class="side-line"></div>
  </div>

  <!-- ─── MAIN CONTENT ─── -->
  <div class="container">
    <div class="section-box-banner">
      <div class="banner-content">

        <!-- Pretitle -->
        <p class="banner-pretitle">
          <span class="pretitle-line"></span>
          Hello — My name is
        </p>

        <!-- Name with glitch layers -->
        <div class="banner-name-wrap">
          <h2 class="banner-name main-name">Firas Abdallah</h2>
          <h2 class="banner-name glitch-layer g1" aria-hidden="true">Firas Abdallah</h2>
          <h2 class="banner-name glitch-layer g2" aria-hidden="true">Firas Abdallah</h2>
        </div>

        <!-- Typewriter subtitle -->
        <h3 class="banner-subtitle" #bannerSubtitle>
          <span class="typed-text"></span><span class="type-cursor">|</span>
        </h3>

        <!-- Description -->
        <div class="banner-description">
          <p [innerHTML]='"Banner.Description" | translate'></p>
        </div>

        <!-- CTA row -->
        <div class="banner-cta">
          <a class="main-btn cta-primary"
             href="mailto:abdallah.firas@outlook.fr"
             (click)='analyticsService.sendAnalyticEvent("click_say_hi","banner","email")'>
            Say Hi
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </a>
          <a class="main-btn cta-secondary"
   [href]="'Header.cvName' | translate"
   download
   (click)='analyticsService.sendAnalyticEvent("click_cv","banner","cv")'>
  {{ 'Header.cvBtn' | translate }}
</a>
        </div>

        <!-- Stats bar -->
        <div class="banner-stats">
          <div class="stat-item">
            <span class="stat-num">3+</span>
            <span class="stat-label">Yrs Experience</span>
          </div>
          <div class="stat-divider"></div>
          <div class="stat-item">
            <span class="stat-num">10+</span>
            <span class="stat-label">Projects Built</span>
          </div>
          <div class="stat-divider"></div>
          <div class="stat-item">
            <span class="stat-num live-num">
              <span class="live-dot"></span> Open to Work
            </span>
          </div>
        </div>

      </div>
      <div class="banner-right-shape">
        <div class="shape-glow"></div>
        <div class="shape-core"></div>
        <div class="shape-ring"></div>
      </div>
    </div>
  </div>

  <!-- ─── LOCATION + LIVE CLOCK ─── -->
  <div class="banner-meta">
    <span class="meta-location">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
      El Ghazela, Tunis
    </span>
    <span class="meta-time">{{ liveTime }}</span>
  </div>

  <!-- ─── SCROLL CUE ─── -->
  <div class="scroll-indicator">
    <span class="scroll-label">Scroll</span>
    <div class="scroll-line"><div class="scroll-thumb"></div></div>
  </div>

</section>
