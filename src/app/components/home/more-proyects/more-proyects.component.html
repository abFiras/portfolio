<section class="section section-alt more-proyects" id="more-proyects">
  <div class="container">
    <div class="section-box">

      <div class="sr">
        <h3 class="section-title">
          <span class="n-section-title">03.1</span>
          {{ "OtherProjects.Title" | translate }}
        </h3>
      </div>

      <div class="more-grid" *ngIf="projects.length > 0">
        <div
          *ngFor="let project of projects; let i = index"
          class="more-card sr"
          [class.sr-d1]="i%3===0"
          [class.sr-d2]="i%3===1"
          [class.sr-d3]="i%3===2"
          (click)="redirect(project['demoLink'], $event)">

          <div class="more-card-top">
            <div class="more-folder-icon">
              <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
                <path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/>
              </svg>
            </div>
            <div class="more-card-links">
              <a *ngIf="project['ghLink']" [href]="project['ghLink']" target="_blank"
                 (click)="$event.stopPropagation()" class="more-link" title="GitHub">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
              </a>
              <a *ngIf="project['demoLink']" [href]="project['demoLink']" target="_blank"
                 (click)="$event.stopPropagation()" class="more-link" title="Live demo">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6M15 3h6v6M10 14L21 3"/>
                </svg>
              </a>
            </div>
          </div>

          <h5 class="more-card-title">{{ project.Title }}</h5>
          <p class="more-card-desc">{{ project.Description }}</p>

          <div class="more-card-tags">
            <span class="more-tag" *ngFor="let tech of project.Technologies">{{ tech }}</span>
          </div>

          <div class="more-card-hover-line"></div>
        </div>
      </div>

      <!-- Loading -->
      <div class="jobs-loading" *ngIf="projects.length === 0">
        <span class="loading-dot"></span>
        <span class="loading-dot"></span>
        <span class="loading-dot"></span>
      </div>

    </div>
  </div>
</section>
