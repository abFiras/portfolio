<section class="section proyects" id="proyects">
  <div class="container">
    <div class="section-box">

      <div class="sr">
        <h3 class="section-title">
          <span class="n-section-title">03.</span>
          {{ "FeatureProjects.Title" | translate }}
        </h3>
      </div>

      <div class="projects-grid" *ngIf="projects.length > 0">
        <div
          *ngFor="let project of projects; let i = index"
          class="project-card sr"
          [class.sr-d1]="i===0" [class.sr-d2]="i===1" [class.sr-d3]="i===2">

          
          <div class="card-media">
            <div class="card-images" *ngIf="project.imgs && project.imgs.length > 0">
              <img
                *ngFor="let img of project.imgs; let j = index"
                [src]="img"
                [alt]="project.Title"
                class="card-img"
                [class.active]="getImgIndex(i, project.imgs.length) === j"
                (error)="onImgError($event, i)">
            </div>

            <div class="card-img-placeholder" [class.hidden]="project.imgs && project.imgs.length > 0 && !imgErrors[i]">
              <div class="placeholder-inner">
                <span class="placeholder-icon">⬡</span>
                <span class="placeholder-text">{{ project.Title }}</span>
                <span class="placeholder-hint">assets/images/</span>
              </div>
            </div>

            <div class="carousel-dots" *ngIf="project.imgs && project.imgs.length > 1">
              <button
                *ngFor="let img of project.imgs; let j = index"
                class="dot"
                [class.active]="getImgIndex(i, project.imgs.length) === j"
                (click)="setImg(i, j)">
              </button>
            </div>

            <div class="card-overlay">
              <span class="card-overlay-label">{{ sectionLabel }}</span>
              <a *ngIf="project['ghLink']" [href]="project['ghLink']" target="_blank" class="card-overlay-link">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
              </a>
            </div>
          </div>

          <!-- BODY SIDE -->
          <div class="card-body">
            <div class="card-meta">
              <span class="card-num">0{{i+1}}</span>
              <span class="card-badge">{{ sectionLabel }}</span>
            </div>
            <h4 class="card-title">{{ project.Title }}</h4>
            <p class="card-desc" [innerHTML]="project.Description"></p>
            <div class="card-tags">
              <span class="tag" *ngFor="let tech of project.Technologies">{{ tech }}</span>
            </div>
          </div>

        </div>
      </div>

      <!-- Loading -->
      <div class="jobs-loading" *ngIf="projects.length === 0">
        <span class="loading-dot"></span>
        <span class="loading-dot"></span>
        <span class="loading-dot"></span>
      </div>

    </div>
  </div>
</section>
